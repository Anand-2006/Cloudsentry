<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudSentry — Load Balancer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:        #080c10;
    --bg2:       #0d1318;
    --bg3:       #111820;
    --border:    #1e2d3d;
    --border2:   #243545;
    --text:      #c9d8e8;
    --text2:     #5a7a96;
    --text3:     #3a5570;
    --accent:    #00d4ff;
    --accent2:   #0099cc;
    --green:     #00e676;
    --green2:    #00c853;
    --red:       #ff3d57;
    --red2:      #c62828;
    --amber:     #ffab00;
    --amber2:    #e65100;
    --purple:    #7c4dff;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .scanline {
    pointer-events: none;
    position: fixed; inset: 0; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes slideIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(0,212,255,.2)} 50%{box-shadow:0 0 20px rgba(0,212,255,.5)} }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const API = ''; // Served from same origin
const ZONES = ['us-east-1a','us-east-1b','us-west-1a'];
const ZONE_COLORS = { 'us-east-1a':'#ff6b35', 'us-east-1b':'#00d4ff', 'us-west-1a':'#00e676' };
// Benchmark data will be loaded from API
const DEFAULT_BENCH = {
  skipListTput: 0,
  stdMapTput: 0,
  skipListMs: 0,
  stdMapMs: 0
};

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n;
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));

// ── Mock data generator ───────────────────────────────────────────────────────
function genMockState(prev, deadZones, deadServers) {
  const zones = ['us-east-1a','us-east-1b','us-west-1a'];
  const servers = Array.from({length:9}, (_,i) => {
    const zone = zones[i%3];
    const alive = !deadZones.includes(zone) && !deadServers.includes(i);
    const prevS = prev?.servers?.[i];
    const base = prevS?.totalReqs || 0;
    const added = alive ? Math.floor(Math.random()*15+5) : 0;
    return {
      id: i, zone,
      connections: alive ? Math.floor(Math.random()*8) : 0,
      totalReqs: base + added,
      errorRate: alive ? +(Math.random()*8).toFixed(1) : 0,
      avgLatency: alive ? +(80 + Math.random()*120).toFixed(1) : 0,
      healthy: alive,
      circuit: alive ? (Math.random()<.05 ? 'OPEN' : 'CLOSED') : 'DEAD',
      queueDepth: alive ? Math.floor(Math.random()*5) : 0,
    };
  });

  const prevTput = prev?.throughput || Array(60).fill(0);
  const newTput  = [
    ...prevTput.slice(1),
    deadZones.length > 0
      ? Math.floor(Math.random()*30+10)
      : Math.floor(Math.random()*80+40)
  ];

  const prevRouted = prev?.totalRouted || 0;
  return {
    servers,
    deadZones,
    totalRouted: prevRouted + servers.reduce((s,x)=>s+(x.healthy?Math.floor(Math.random()*5):0),0),
    throughput: newTput,
    events: prev?.events || [],
  };
}

// ── Tiny components ───────────────────────────────────────────────────────────
const Badge = ({label, color}) => (
  <span style={{
    fontSize:10, fontFamily:'var(--font-mono)', fontWeight:500,
    padding:'2px 7px', borderRadius:3,
    border:`1px solid ${color}33`,
    background:`${color}18`, color,
    letterSpacing:'.04em',
  }}>{label}</span>
);

const Dot = ({alive}) => (
  <span style={{
    display:'inline-block', width:6, height:6, borderRadius:'50%',
    background: alive ? 'var(--green)' : 'var(--red)',
    boxShadow: alive ? '0 0 6px var(--green)' : 'none',
    animation: alive ? 'pulse 2s infinite' : 'none',
  }}/>
);

// ── Header ────────────────────────────────────────────────────────────────────
function Header({totalRouted, tput, healthy}) {
  const [time, setTime] = useState(new Date());
  useEffect(()=>{ const id=setInterval(()=>setTime(new Date()),1000); return ()=>clearInterval(id); },[]);

  return (
    <div style={{
      borderBottom:'1px solid var(--border)',
      padding:'0 28px',
      display:'flex', alignItems:'center', justifyContent:'space-between',
      height:56, flexShrink:0,
    }}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{
          width:32,height:32,borderRadius:6,
          background:'linear-gradient(135deg,var(--accent2),var(--accent))',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:14, fontWeight:700, color:'#000',
          fontFamily:'var(--font-sans)',
        }}>CS</div>
        <div>
          <div style={{fontSize:15,fontWeight:700,fontFamily:'var(--font-sans)',color:'#fff',letterSpacing:'.02em'}}>
            CloudSentry
          </div>
          <div style={{fontSize:10,color:'var(--text2)',letterSpacing:'.06em'}}>DYNAMIC LOAD BALANCER</div>
        </div>
      </div>

      <div style={{display:'flex',gap:32,alignItems:'center'}}>
        {[
          {label:'ROUTED', val: totalRouted.toLocaleString()},
          {label:'REQ/S',  val: Math.round(tput)},
          {label:'UP',     val: `${healthy}/9`},
          {label:'SEARCH DEPTH', val: 'O(log 9)'},
        ].map(m=>(
          <div key={m.label} style={{textAlign:'right'}}>
            <div style={{fontSize:10,color:'var(--text2)',letterSpacing:'.08em'}}>{m.label}</div>
            <div style={{fontSize:16,fontWeight:600,color:'var(--accent)',fontFamily:'var(--font-sans)'}}>{m.val}</div>
          </div>
        ))}
        <div style={{borderLeft:'1px solid var(--border)',paddingLeft:24,fontSize:11,color:'var(--text2)',fontFamily:'var(--font-mono)'}}>
          <div style={{color:'var(--green)',fontSize:10,letterSpacing:'.06em',marginBottom:2}}>● LIVE</div>
          {time.toLocaleTimeString()}
        </div>
      </div>
    </div>
  );
}

// ── Server Card ───────────────────────────────────────────────────────────────
function ServerCard({s, onKill, onRevive}) {
  const zColor = ZONE_COLORS[s.zone];
  const loadPct = clamp(s.connections * 12 + s.errorRate * 1.5, 0, 100);
  const barColor = loadPct > 70 ? 'var(--red)' : loadPct > 40 ? 'var(--amber)' : 'var(--green)';

  return (
    <div style={{
      background:'var(--bg2)',
      border:`1px solid ${s.healthy ? 'var(--border)' : 'var(--red2)'}`,
      borderRadius:8,
      padding:'12px 14px',
      animation:'slideIn .3s ease',
      opacity: s.healthy ? 1 : 0.6,
      transition:'all .3s',
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'#fff',fontFamily:'var(--font-sans)'}}>
            srv-{String(s.id).padStart(2,'0')}
          </div>
          <div style={{fontSize:10,color:zColor,marginTop:1,letterSpacing:'.04em'}}>{s.zone}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <Dot alive={s.healthy}/>
          {s.circuit && s.circuit !== 'CLOSED' && (
            <span style={{
              fontSize:9,letterSpacing:'.06em',fontWeight:600,
              color: s.circuit==='OPEN'?'var(--red)':'var(--amber)',
            }}>{s.circuit}</span>
          )}
        </div>
      </div>

      {/* load bar */}
      <div style={{height:3,background:'var(--bg3)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
        <div style={{
          height:'100%', width:`${loadPct}%`,
          background:barColor,borderRadius:2,
          transition:'width .4s',
        }}/>
      </div>

      <div style={{
        display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:'4px 0', fontSize:10, color:'var(--text2)',
      }}>
        <span>conn <span style={{color:'var(--text)'}}>{s.connections}</span></span>
        <span>queue <span style={{color:'var(--text)'}}>{s.queue}</span></span>
        <span>err <span style={{color: s.errorRate>10?'var(--red)':'var(--text)'}}>{s.errorRate.toFixed(1)}%</span></span>
        <span>lat <span style={{color:'var(--text)'}}>{Math.round(s.avgLatency)}ms</span></span>
      </div>

      <div style={{marginTop:10,display:'flex',gap:6}}>
        {s.healthy
          ? <button onClick={()=>onKill(s.id)} style={{
              flex:1,fontSize:10,padding:'4px 0',cursor:'pointer',borderRadius:4,
              border:'1px solid var(--red2)',background:'transparent',color:'var(--red)',
              fontFamily:'var(--font-mono)',letterSpacing:'.04em',
            }}>KILL</button>
          : <button onClick={()=>onRevive(s.id)} style={{
              flex:1,fontSize:10,padding:'4px 0',cursor:'pointer',borderRadius:4,
              border:'1px solid var(--green2)',background:'transparent',color:'var(--green)',
              fontFamily:'var(--font-mono)',letterSpacing:'.04em',
            }}>REVIVE</button>
        }
      </div>
    </div>
  );
}

// ── Throughput Chart ──────────────────────────────────────────────────────────
function TputChart({data}) {
  const ref = useRef(null);
  const chart = useRef(null);

  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, {
      type:'line',
      data:{
        labels: data.map((_,i)=>i),
        datasets:[{
          data,
          borderColor:'#00d4ff',
          borderWidth:1.5,
          pointRadius:0,
          fill:true,
          backgroundColor:'rgba(0,212,255,.06)',
          tension:0.4,
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        animation:{duration:0},
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{
          x:{display:false},
          y:{
            beginAtZero:true,
            grid:{color:'rgba(30,45,61,.8)'},
            ticks:{color:'#5a7a96',font:{family:'JetBrains Mono',size:10},maxTicksLimit:4},
          }
        }
      }
    });
  },[data]);

  return <canvas ref={ref} role="img" aria-label="Throughput over time"/>;
}

// ── Skip List Benchmark Chart ────────────────────────────────────────────────
function BenchChart({workload}) {
  const ref = useRef(null);
  const chart = useRef(null);

  useEffect(()=>{
    if(!ref.current || !workload) return;
    if(chart.current) chart.current.destroy();
    
    chart.current = new Chart(ref.current, {
      type:'bar',
      data:{
        labels: ['Operations per Second (Throughput)'],
        datasets:[
          {label:'Standard Map', data:[workload.stdMapTput], backgroundColor:'#3a5570', borderRadius:3},
          {label:'Skip List',   data:[workload.skipListTput], backgroundColor:'#00e676', borderRadius:3},
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        animation:{duration:300},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#0d1318',
            borderColor:'#1e2d3d',
            borderWidth:1,
            titleColor:'#c9d8e8',
            bodyColor:'#5a7a96',
            titleFont:{family:'JetBrains Mono',size:11},
            bodyFont:{family:'JetBrains Mono',size:10},
            callbacks:{ label: ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)} ops/s` }
          }
        },
        scales:{
          x:{
            ticks:{color:'#5a7a96',font:{family:'JetBrains Mono',size:10}},
            grid:{color:'rgba(30,45,61,.4)'},
          },
          y:{
            ticks:{color:'#5a7a96',font:{family:'JetBrains Mono',size:10},callback:v=>fmt(v)},
            grid:{color:'rgba(30,45,61,.4)'},
          }
        }
      }
    });
  },[workload]);

  return <canvas ref={ref} role="img" aria-label={`Skip list benchmark - ${workload}`}/>;
}

// ── Binomial Heap Merge Chart ────────────────────────────────────────────────

// ── Event Log ─────────────────────────────────────────────────────────────────
function EventLog({events}) {
  const TYPE_STYLE = {
    kill:   {color:'var(--red)',   border:'var(--red2)'},
    revive: {color:'var(--green)', border:'var(--green2)'},
    spike:  {color:'var(--amber)', border:'var(--amber2)'},
    info:   {color:'var(--accent)',border:'var(--accent2)'},
  };
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {events.length === 0
        ? <div style={{color:'var(--text3)',fontSize:12,padding:'12px 0'}}>No events yet.</div>
        : events.slice(0,8).map((e,i)=>{
            const s = TYPE_STYLE[e.type]||TYPE_STYLE.info;
            return (
              <div key={i} style={{
                fontSize:11, padding:'6px 10px',
                borderLeft:`2px solid ${s.border}`,
                background:`${s.border}10`,
                borderRadius:'0 4px 4px 0',
                color: s.color,
                animation:'slideIn .2s ease',
              }}>
                {e.msg}
              </div>
            );
          })
      }
    </div>
  );
}

// ── Zone Controls ─────────────────────────────────────────────────────────────
function ZoneControls({deadZones, onKillZone, onReviveZone}) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {ZONES.map(z=>{
        const dead = deadZones.includes(z);
        const zc   = ZONE_COLORS[z];
        return (
          <div key={z} style={{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'8px 12px',
            background:'var(--bg3)',
            border:`1px solid ${dead?'var(--red2)':'var(--border)'}`,
            borderRadius:6,
          }}>
            <div>
              <div style={{fontSize:11,color:zc,fontWeight:500}}>{z}</div>
              <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>
                {dead ? '3 servers offline' : '3 servers online'}
              </div>
            </div>
            {dead
              ? <button onClick={()=>onReviveZone(z)} style={{
                  fontSize:10,padding:'4px 10px',cursor:'pointer',borderRadius:4,
                  border:'1px solid var(--green2)',background:'transparent',
                  color:'var(--green)',fontFamily:'var(--font-mono)',
                }}>REVIVE</button>
              : <button onClick={()=>onKillZone(z)} style={{
                  fontSize:10,padding:'4px 10px',cursor:'pointer',borderRadius:4,
                  border:'1px solid var(--red2)',background:'transparent',
                  color:'var(--red)',fontFamily:'var(--font-mono)',
                }}>KILL</button>
            }
          </div>
        );
      })}
    </div>
  );
}

// ── Section label ─────────────────────────────────────────────────────────────
// ── Skip List Structural Visualizer ──────────────────────────────────────────
function SkipListVisualizer({servers, deadZones}) {
  const levels = [3, 2, 1, 0];
  const alive = servers.filter(s => s.healthy && !deadZones.includes(s.zone));
  
  return (
    <div style={{padding: '20px 0', overflowX: 'auto'}}>
      {levels.map(lvl => (
        <div key={lvl} style={{display: 'flex', alignItems: 'center', marginBottom: 15, gap: 10}}>
          <div style={{width: 60, fontSize: 10, color: 'var(--text3)', fontWeight: 'bold'}}>LEVEL {lvl}</div>
          <div style={{display: 'flex', gap: 2, flex: 1, position: 'relative', height: 20, alignItems: 'center'}}>
            <div style={{width: '100%', height: 1, background: 'var(--border2)', position: 'absolute', zIndex: 0}} />
            {servers.map((s, idx) => {
              const isPromoted = (s.id + lvl) % (lvl + 1) === 0;
              const isHealthy = s.healthy && !deadZones.includes(s.zone);
              return (
                <div key={s.id} style={{
                  width: 24, height: 24, borderRadius: '50%',
                  background: isPromoted ? (isHealthy ? 'var(--green)' : 'var(--red2)') : 'transparent',
                  border: isPromoted ? 'none' : '1px solid var(--border)',
                  zIndex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 8, color: '#000', fontWeight: 'bold',
                  opacity: isPromoted ? 1 : 0.2, transition: 'all 0.3s'
                }}>
                  {isPromoted ? s.id : ''}
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{marginTop: 20, fontSize: 11, color: 'var(--text2)', fontStyle: 'italic'}}>
        Visualizing O(log N) search paths through the leveled server index.
      </div>
    </div>
  );
}

const SLabel = ({children}) => (
  <div style={{
    fontSize:9,letterSpacing:'.1em',color:'var(--text3)',
    fontWeight:600, marginBottom:10, paddingBottom:6,
    borderBottom:'1px solid var(--border)',
  }}>{children}</div>
);

// ── DS Info Panel ─────────────────────────────────────────────────────────────
function DSInfoPanel() {
  const ds = [
    {name:'Persistence Layer',    role:'Client session affinity',    complexity:'O(1)*',     color:'var(--amber)'},
    {name:'Peak Analytics',       role:'Real-time load forecasting', complexity:'O(log n)',  color:'var(--red)'},
    {name:'Distributed Queue',    role:'High-availability queueing', complexity:'O(log n)',  color:'var(--purple)'},
    {name:'L7 Path Router',       role:'URL-based traffic steering', complexity:'O(L)',      color:'var(--accent)'},
    {name:'Load Indexer',         role:'Global server discovery',    complexity:'O(log n)',  color:'var(--green)'},
    {name:'Token Bucket',          role:'Per-client rate limiter',    complexity:'O(1)',      color:'var(--green2)'},
  ];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {ds.map(d=>(
        <div key={d.name} style={{
          display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'6px 10px', background:'var(--bg3)',
          border:'1px solid var(--border)',borderRadius:5,
        }}>
          <div>
            <div style={{fontSize:11,color:'#fff',fontWeight:500}}>{d.name}</div>
            <div style={{fontSize:10,color:'var(--text2)',marginTop:1}}>{d.role}</div>
          </div>
          <span style={{
            fontSize:10,color:d.color,
            border:`1px solid ${d.color}44`,
            background:`${d.color}11`,
            padding:'2px 8px',borderRadius:3,
            fontWeight:600,letterSpacing:'.04em',whiteSpace:'nowrap',
          }}>{d.complexity}</span>
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [state, setState]         = useState(null);
  const [deadZones, setDeadZones] = useState([]);
  const [deadSrvs, setDeadSrvs]   = useState([]);
  const [tab, setTab]             = useState('servers');
  const [benchData, setBenchData] = useState(DEFAULT_BENCH);
  const [loadingBench, setLoading] = useState(false);
  const [events, setEvents]       = useState([]);
  const [chaosEnabled, setChaos]   = useState(false);
  const stateRef = useRef(null);

  const addEvent = useCallback((type, msg) => {
    setEvents(ev => [{type, msg, ts: Date.now()}, ...ev].slice(0, 20));
  }, []);

  // tick simulation
  useEffect(() => {
    const id = setInterval(async () => {
      try {
        const r = await fetch(`${API}/status`);
        if (r.ok) {
          const data = await r.json();
          setState(data);
          stateRef.current = data;
          setDeadZones(data.deadZones || []);
          setEvents(data.events || []);
          if (data.chaosEnabled !== undefined) setChaos(data.chaosEnabled);
        }
      } catch {}
    }, 1200);
    return () => clearInterval(id);
  }, []);

  const runBench = async () => {
    setLoading(true);
    try {
      const r = await fetch(`${API}/bench`);
      if (r.ok) {
        const data = await r.json();
        setBenchData(data);
      }
    } catch(e) {
      console.error("Bench failed:", e);
    }
    setLoading(false);
  };

  const killZone = async (zone) => {
    addEvent('kill', `Zone ${zone} KILLED — Binomial Heap failover triggered`);
    setDeadZones(dz => [...dz, zone]);
    try { await fetch(`${API}/zone/kill/${zone}`, {method:'POST'}); } catch {}
  };

  const reviveZone = async (zone) => {
    addEvent('revive', `Zone ${zone} REVIVED — DSU component re-enabled`);
    setDeadZones(dz => dz.filter(z => z !== zone));
    try { await fetch(`${API}/zone/revive/${zone}`, {method:'POST'}); } catch {}
  };

  const killSrv = async (id) => {
    addEvent('kill', `Server ${id} KILLED — queue merged via Binomial Heap O(log n)`);
    setDeadSrvs(ds => [...ds, id]);
    try { await fetch(`${API}/server/kill/${id}`, {method:'POST'}); } catch {}
  };

  const reviveSrv = async (id) => {
    addEvent('revive', `Server ${id} REVIVED — rejoining skip list index`);
    setDeadSrvs(ds => ds.filter(s => s !== id));
    try { await fetch(`${API}/server/revive/${id}`, {method:'POST'}); } catch {}
  };

  const servers   = state?.servers || Array.from({length:9},(_,i)=>({
    id:i, zone:ZONES[i%3], connections:0, totalReqs:0,
    errorRate:0, avgLatency:0, healthy:true, circuit:'CLOSED', queue:0
  }));
  const throughput = state?.throughput || Array(60).fill(0);
  const totalRouted = state?.totalRouted || 0;
  const simIntensity = state?.simIntensity || 100;
  const tput = throughput[throughput.length-1] || 0;
  const healthy = servers.filter(s=>s.healthy).length;

  const TABS = ['servers','zones','interaction','visualizer','benchmark','events'];

  const setIntensity = async (v) => {
      try { await fetch(`${API}/simulation/intensity?val=${v}`, {method:'POST'}); } catch {}
  };

  return (
    <div style={{

// ── Logic Algorithm Visualizer (FULL REWRITE) ──
function LogicVisualizer({servers, total}) {
  const totalQueue = servers.reduce((sum, s) => sum + s.connections + (s.queue || 0), 0);
  const queueBits  = Math.max(1, totalQueue).toString(2).split('').reverse();
  const activePath = ['/api/v1','/api/v2','/static','/auth'][total % 4];
  const pathParts  = activePath.split('/').filter(Boolean);
  const clientId   = 1000 + (total * 7) % 8999;
  const splayTarget = servers.filter(s=>s.healthy)[0]?.id ?? 0;
  const deadCount  = servers.filter(s => !s.healthy).length;

  // helpers
  const nodeW = 80, nodeH = 56, gap = 8;
  const svgW = 70 + servers.length * (nodeW + gap) + 20; // 70px label offset + padding

  return (
    <div style={{display:'flex', flexDirection:'column', gap:24}}>

      {/* ───────── SKIP LIST ───────── */}
      <div style={{background:'rgba(255,255,255,0.02)', padding:24, borderRadius:12, border:'1px solid var(--border)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
          <SLabel>UNIT 4 — SKIP LIST  (LAYERED SEARCH INDEX)</SLabel>
          <span style={{fontSize:10, color: deadCount ? 'var(--red)' : 'var(--green)', fontWeight:600}}>
            {deadCount ? `${deadCount} NODE(S) BYPASSED` : 'ALL NODES INDEXED'}
          </span>
        </div>

        {/* SVG skip list */}
        <div style={{overflowX:'auto', paddingBottom:8}}>
          <svg width={svgW} height={185} style={{display:'block', minWidth:'100%'}}>
            {/* Level labels */}
            {['L2 Express','L1 Fast','L0 Base'].map((lbl,li)=>(
              <text key={li} x={0} y={18 + li*55} fill="var(--text3)" fontSize={8} fontFamily="var(--font-mono)">{lbl}</text>
            ))}

            {/* Level 2 — every 4th healthy server */}
            {servers.map((s,i) => {
              const x = 70 + i*(nodeW+gap);
              const show = s.healthy && i%4===0;
              return show ? <React.Fragment key={'l2-'+i}>
                <rect x={x} y={6} width={nodeW} height={22} rx={4} fill="rgba(0,230,118,0.12)" stroke="var(--green)" strokeWidth={1}/>
                <text x={x+nodeW/2} y={20} textAnchor="middle" fill="var(--green)" fontSize={9} fontFamily="var(--font-mono)">srv-{String(i).padStart(2,'0')}</text>
              </React.Fragment> : null;
            })}
            {/* L2 arrows */}
            {(() => {
              const l2 = servers.map((s,i)=>({s,i})).filter(({s,i})=>s.healthy && i%4===0);
              return l2.slice(0,-1).map(({i},idx) => {
                const x1=70+i*(nodeW+gap)+nodeW; const x2=70+l2[idx+1].i*(nodeW+gap);
                return <line key={'l2a'+idx} x1={x1} y1={17} x2={x2} y2={17} stroke="var(--green)" strokeWidth={1} strokeDasharray="4 2" opacity={0.5}/>;
              });
            })()}

            {/* Level 1 — every 2nd healthy */}
            {servers.map((s,i) => {
              const x = 70 + i*(nodeW+gap);
              const show = s.healthy && i%2===0;
              return show ? <React.Fragment key={'l1-'+i}>
                <rect x={x} y={60} width={nodeW} height={22} rx={4} fill="rgba(0,176,255,0.1)" stroke="var(--acc)" strokeWidth={1}/>
                <text x={x+nodeW/2} y={74} textAnchor="middle" fill="var(--acc)" fontSize={9} fontFamily="var(--font-mono)">srv-{String(i).padStart(2,'0')}</text>
              </React.Fragment> : null;
            })}
            {/* L1 arrows */}
            {(() => {
              const l1 = servers.map((s,i)=>({s,i})).filter(({s,i})=>s.healthy && i%2===0);
              return l1.slice(0,-1).map(({i},idx) => {
                const x1=70+i*(nodeW+gap)+nodeW; const x2=70+l1[idx+1].i*(nodeW+gap);
                return <line key={'l1a'+idx} x1={x1} y1={71} x2={x2} y2={71} stroke="var(--acc)" strokeWidth={1} strokeDasharray="4 2" opacity={0.4}/>;
              });
            })()}

            {/* Level 0 — all servers (base) */}
            {servers.map((s,i) => {
              const x = 70 + i*(nodeW+gap);
              const alive = s.healthy;
              return <React.Fragment key={'l0-'+i}>
                <rect x={x} y={115} width={nodeW} height={nodeH} rx={6}
                  fill={alive ? 'var(--bg2)' : 'rgba(239,68,68,0.08)'}
                  stroke={alive ? 'var(--border)' : 'var(--red)'}
                  strokeWidth={alive ? 1 : 1.5}
                  strokeDasharray={alive ? '0' : '4 2'}
                />
                <text x={x+nodeW/2} y={132} textAnchor="middle" fill={alive?'#fff':'var(--red)'} fontSize={10} fontWeight="bold" fontFamily="var(--font-mono)">
                  srv-{String(i).padStart(2,'0')}
                </text>
                <text x={x+nodeW/2} y={146} textAnchor="middle" fill={alive?'var(--text2)':'var(--red)'} fontSize={8} fontFamily="var(--font-mono)">
                  {alive ? `conn ${s.connections} | q ${s.queue||0}` : '✕ DEAD'}
                </text>
                <text x={x+nodeW/2} y={162} textAnchor="middle" fill="var(--text3)" fontSize={7} fontFamily="var(--font-mono)">
                  {alive ? `${s.errorRate.toFixed(1)}% err` : 'BYPASSED'}
                </text>
                {/* vertical links to upper levels */}
                {alive && i%2===0 && <line x1={x+nodeW/2} y1={115} x2={x+nodeW/2} y2={82} stroke="var(--border)" strokeWidth={1} strokeDasharray="2 2"/>}
                {alive && i%4===0 && <line x1={x+nodeW/2} y1={60}  x2={x+nodeW/2} y2={28}  stroke="var(--border)" strokeWidth={1} strokeDasharray="2 2"/>}
              </React.Fragment>;
            })}
          </svg>
        </div>
        <div style={{fontSize:10, color:'var(--text3)', marginTop:6}}>
           Probabilistic express lanes allow O(log n) server lookup. Dead nodes are <span style={{color:'var(--red)'}}>removed from all levels</span> — traffic jumps over them.
        </div>
      </div>

      {/* ───────── ROW 2: HEAP + TRIE ───────── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>

        {/* BINOMIAL HEAP */}
        <div style={{background:'rgba(255,255,255,0.02)', padding:24, borderRadius:12, border:'1px solid var(--border)'}}>
          <SLabel>UNIT 2 — BINOMIAL HEAP  (PRIORITY QUEUE DECOMPOSITION)</SLabel>
          <div style={{display:'flex', alignItems:'flex-end', justifyContent:'center', gap:20, minHeight:160, marginTop:16, paddingBottom:10}}>
            {totalQueue > 0 ? queueBits.map((bit, rank) => {
              if (bit !== '1') return null;
              const n = Math.pow(2, rank);
              const children = rank > 0 ? Array.from({length: Math.min(rank, 4)}) : [];
              return (
                <div key={rank} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
                  {/* Root node */}
                  <div style={{
                    width: 40+rank*8, height: 40+rank*8, borderRadius:'50%',
                    background: 'linear-gradient(135deg, var(--purple), #7c3aed)',
                    boxShadow: '0 0 20px rgba(168,85,247,0.35)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    color:'#fff', fontSize:10, fontWeight:'bold', border:'2px solid rgba(255,255,255,0.15)'
                  }}>
                    {n}
                  </div>
                  {/* Children branches */}
                  {children.length > 0 && <div style={{width:2, height:12, background:'var(--purple)', opacity:0.4}}/>}
                  {children.length > 0 && (
                    <div style={{display:'flex', gap:4}}>
                      {children.map((_,ci) => (
                        <div key={ci} style={{
                          width:12, height:12, borderRadius:'50%',
                          background:'var(--purple)', opacity: 0.3 + ci*0.15,
                          border:'1px solid rgba(168,85,247,0.3)'
                        }}/>
                      ))}
                    </div>
                  )}
                  <div style={{fontSize:8, color:'var(--text3)', marginTop:4}}>B<sub>{rank}</sub></div>
                </div>
              );
            }) : (
              <div style={{color:'var(--text3)', fontSize:11}}>Queue Empty — No Trees</div>
            )}
          </div>
          <div style={{
            marginTop:12, padding:'10px 14px', background:'rgba(168,85,247,0.06)',
            border:'1px solid rgba(168,85,247,0.15)', borderRadius:8, textAlign:'center'
          }}>
            <span style={{fontSize:11, color:'var(--purple)', fontWeight:'bold'}}>{totalQueue}</span>
            <span style={{fontSize:10, color:'var(--text3)'}}> active requests = </span>
            <span style={{fontSize:11, color:'var(--purple)', fontFamily:'var(--font-mono)'}}>
              {Math.max(1,totalQueue).toString(2)}₂
            </span>
            <span style={{fontSize:10, color:'var(--text3)'}}> → {queueBits.filter(b=>b==='1').length} trees in forest</span>
          </div>
        </div>

        {/* URL TRIE */}
        <div style={{background:'rgba(255,255,255,0.02)', padding:24, borderRadius:12, border:'1px solid var(--border)'}}>
          <SLabel>UNIT 3 — URL TRIE  (L7 PATH-BASED ROUTING)</SLabel>
          <div style={{marginTop:16}}>
            {/* Root */}
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:2}}>
              <div style={{width:50, height:28, borderRadius:6, background:'#334155', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'#94a3b8', fontWeight:'bold', border:'1px solid var(--border)'}}>ROOT</div>
            </div>
            {/* Branches */}
            {[
              {path:'/api/v1', dest:'srv-00,01,02', zone:'us-east-1a', prio:'HIGH'},
              {path:'/api/v2', dest:'srv-03,04,05', zone:'us-east-1b', prio:'NORM'},
              {path:'/static',  dest:'srv-06,07,08', zone:'us-west-1a', prio:'LOW'},
              {path:'/auth',    dest:'round-robin',  zone:'any',        prio:'CRIT'},
            ].map((route, ri) => {
              const parts = route.path.split('/').filter(Boolean);
              const isActive = activePath === route.path;
              const color = isActive ? 'var(--acc2)' : 'var(--text3)';
              return (
                <div key={ri} style={{
                  display:'flex', alignItems:'center', gap:6, padding:'5px 0 5px 16px',
                  borderLeft: `2px solid ${isActive ? 'var(--acc2)' : 'var(--border)'}`,
                  marginLeft: 24, transition:'all .3s',
                  background: isActive ? 'rgba(0,230,118,0.04)' : 'transparent',
                  borderRadius: '0 6px 6px 0',
                }}>
                  {parts.map((p,pi) => (
                    <React.Fragment key={pi}>
                      <div style={{
                        padding:'3px 10px', borderRadius:4, fontSize:10, fontFamily:'var(--font-mono)',
                        background: isActive ? 'rgba(0,230,118,0.12)' : 'rgba(255,255,255,0.03)',
                        color, border:`1px solid ${isActive ? 'var(--acc2)' : 'var(--border)'}`,
                        fontWeight: isActive ? 'bold' : 'normal',
                      }}>/{p}</div>
                      {pi < parts.length-1 && <span style={{color:'var(--border)'}}>→</span>}
                    </React.Fragment>
                  ))}
                  <span style={{color:'var(--border)', margin:'0 4px'}}>→</span>
                  <span style={{fontSize:9, color, fontFamily:'var(--font-mono)'}}>
                    {route.dest}
                  </span>
                  <Badge label={route.prio} color={isActive ? 'var(--acc2)' : '#475569'}/>
                  {isActive && <span style={{fontSize:9, color:'var(--acc2)', marginLeft:4, animation:'pulse 1s infinite'}}>● ACTIVE</span>}
                </div>
              );
            })}
          </div>
          <div style={{fontSize:10, color:'var(--text3)', marginTop:14}}>
            Character-by-character prefix matching resolves each request path in O(L) time.
          </div>
        </div>
      </div>

      {/* ───────── ROW 3: SPLAY + SEGMENT ───────── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>

        {/* SPLAY TREE */}
        <div style={{background:'rgba(255,255,255,0.02)', padding:24, borderRadius:12, border:'1px solid var(--border)'}}>
          <SLabel>UNIT 1 — SPLAY TREE  (SESSION AFFINITY CACHE)</SLabel>
          <div style={{display:'flex', gap:20, marginTop:16}}>
            {/* Visual tree */}
            <div style={{flex:'0 0 140px'}}>
              <svg width={140} height={130}>
                {/* Root */}
                <circle cx={70} cy={20} r={16} fill="var(--amber)" opacity={0.9}/>
                <text x={70} y={24} textAnchor="middle" fill="#000" fontSize={9} fontWeight="bold">{clientId}</text>
                <text x={70} y={13} textAnchor="middle" fill="rgba(0,0,0,0.5)" fontSize={6}>ROOT</text>
                {/* Left child */}
                <line x1={58} y1={34} x2={35} y2={55} stroke="var(--border)" strokeWidth={1}/>
                <circle cx={35} cy={68} r={12} fill="rgba(255,255,255,0.05)" stroke="var(--border)"/>
                <text x={35} y={71} textAnchor="middle" fill="var(--text3)" fontSize={8}>{clientId-120}</text>
                {/* Right child */}
                <line x1={82} y1={34} x2={105} y2={55} stroke="var(--border)" strokeWidth={1}/>
                <circle cx={105} cy={68} r={12} fill="rgba(255,255,255,0.05)" stroke="var(--border)"/>
                <text x={105} y={71} textAnchor="middle" fill="var(--text3)" fontSize={8}>{clientId+45}</text>
                {/* Grandchildren */}
                <line x1={27} y1={78} x2={15} y2={100} stroke="var(--border)" strokeWidth={1} opacity={0.4}/>
                <circle cx={15} cy={108} r={8} fill="rgba(255,255,255,0.02)" stroke="var(--border)" opacity={0.4}/>
                <line x1={43} y1={78} x2={55} y2={100} stroke="var(--border)" strokeWidth={1} opacity={0.4}/>
                <circle cx={55} cy={108} r={8} fill="rgba(255,255,255,0.02)" stroke="var(--border)" opacity={0.4}/>
                {/* Splay arrow */}
                <path d="M 130 100 C 140 60, 110 10, 90 18" fill="none" stroke="var(--amber)" strokeWidth={1.5} strokeDasharray="3 2"/>
                <polygon points="88,14 94,18 90,22" fill="var(--amber)"/>
                <text x={132} y={112} fill="var(--amber)" fontSize={7} fontFamily="var(--font-mono)">SPLAY</text>
              </svg>
            </div>
            {/* Log panel */}
            <div style={{flex:1, background:'#000', borderRadius:8, padding:12, fontFamily:'var(--font-mono)', fontSize:10, border:'1px solid var(--border)', overflow:'hidden'}}>
              <div style={{color:'var(--text3)', marginBottom:8, borderBottom:'1px solid var(--border)', paddingBottom:6}}>SESSION CACHE LOG</div>
              {[0,1,2,3].map(offset => {
                const cid = 1000 + ((total - offset) * 7) % 8999;
                const sid = servers.filter(s=>s.healthy)[offset % servers.filter(s=>s.healthy).length]?.id ?? 0;
                return (
                  <div key={offset} style={{marginBottom:4, opacity: 1 - offset*0.2}}>
                    <span style={{color:'var(--text3)'}}>client.</span>
                    <span style={{color:'var(--amber)'}}>{cid}</span>
                    <span style={{color:'var(--text3)'}}> → splay → </span>
                    <span style={{color:'var(--green)'}}>srv-{String(sid).padStart(2,'0')}</span>
                    {offset === 0 && <span style={{color:'var(--amber)', marginLeft:6}}>★ ROOT</span>}
                  </div>
                );
              })}
              <div style={{marginTop:8, color:'var(--green)', borderTop:'1px solid var(--border)', paddingTop:6}}>
                Amortized O(1) hit for repeat clients.
              </div>
            </div>
          </div>
        </div>

        {/* SEGMENT TREE — Peak Load */}
        <div style={{background:'rgba(255,255,255,0.02)', padding:24, borderRadius:12, border:'1px solid var(--border)'}}>
          <SLabel>UNIT 5 — SEGMENT TREE  (RANGE MAX QUERY — PEAK LOAD)</SLabel>
          <div style={{marginTop:16}}>
            {/* Bar chart of per-server peak connections */}
            <div style={{display:'flex', alignItems:'flex-end', gap:8, height:120, padding:'0 4px'}}>
              {(() => {
                const maxVal = Math.max(1, ...servers.map(sv => sv.connections + (sv.queue||0)));
                return servers.map((s,i) => {
                  const val = s.connections + (s.queue || 0);
                  const barH = Math.max(6, (val / maxVal) * 110);
                  const isMax = val === maxVal && val > 0;
                  return (
                    <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2, justifyContent:'flex-end', height:'100%'}}>
                      <span style={{fontSize:9, fontWeight: isMax ? 'bold' : 'normal', color: isMax ? 'var(--red)' : 'var(--text2)'}}>{val}</span>
                      <div style={{
                        width:'100%', height: barH,
                        background: !s.healthy ? 'repeating-linear-gradient(45deg, var(--border), var(--border) 2px, transparent 2px, transparent 4px)' : isMax ? 
                          'linear-gradient(to top, var(--red), #f97316)' : 
                          'linear-gradient(to top, var(--acc), #0ea5e9)',
                        borderRadius:'4px 4px 0 0',
                        transition:'height 0.5s ease',
                        boxShadow: isMax ? '0 0 12px rgba(239,68,68,0.4)' : 'none',
                        border: isMax ? '1px solid var(--red)' : 'none',
                      }}/>
                      <span style={{fontSize:8, color: s.healthy ? 'var(--text3)' : 'var(--red)', fontFamily:'var(--font-mono)'}}>{String(i).padStart(2,'0')}</span>
                    </div>
                  );
                });
              })()}
            </div>
            {/* RMQ Result */}
            {(() => {
              const maxSrv = servers.reduce((best, s) => (s.connections + (s.queue||0)) > (best.connections + (best.queue||0)) ? s : best, servers[0]);
              const maxLoad = maxSrv.connections + (maxSrv.queue || 0);
              return (
                <div style={{
                  marginTop:14, padding:'10px 14px',
                  background: 'rgba(239,68,68,0.05)', border:'1px solid rgba(239,68,68,0.15)',
                  borderRadius:8, display:'flex', justifyContent:'space-between', alignItems:'center'
                }}>
                  <div>
                    <div style={{fontSize:9, color:'var(--red)', fontWeight:'bold', marginBottom:2}}>RMQ RESULT [0..{servers.length-1}]</div>
                    <div style={{fontSize:10, color:'var(--text2)'}}>
                      Peak server: <b style={{color:'#fff'}}>srv-{String(maxSrv.id).padStart(2,'0')}</b> at <b style={{color:'var(--red)'}}>{maxLoad}</b> active items
                    </div>
                  </div>
                  <div style={{fontSize:9, color:'var(--text3)', textAlign:'right'}}>
                    Query: O(log n)<br/>Update: O(log n)
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      </div>

      {/* ───────── ROUTING FLOW SUMMARY ───────── */}
      <div style={{
        padding:'14px 20px', background:'rgba(255,255,255,0.015)',
        border:'1px solid var(--border)', borderRadius:10,
        display:'flex', gap:12, alignItems:'center', justifyContent:'center', flexWrap:'wrap'
      }}>
        {[
          {label:'Request In', icon:'📥', color:'var(--text2)'},
          {label:'Splay Cache', icon:'🌳', color:'var(--amber)', unit:'U1'},
          {label:'Heap Queue', icon:'⚙️', color:'var(--purple)', unit:'U2'},
          {label:'Trie Route', icon:'🔀', color:'var(--acc2)', unit:'U3'},
          {label:'Skip Index', icon:'⚡', color:'var(--acc)', unit:'U4'},
          {label:'Peak Track', icon:'📊', color:'var(--red)', unit:'U5'},
          {label:'Response', icon:'✅', color:'var(--green)'},
        ].map((step,i,arr) => (
          <React.Fragment key={i}>
            <div style={{display:'flex', alignItems:'center', gap:6, padding:'4px 10px', background:'rgba(255,255,255,0.03)', borderRadius:6, border:`1px solid ${step.color}22`}}>
              <span>{step.icon}</span>
              <span style={{fontSize:9, color:step.color, fontWeight:'bold'}}>{step.label}</span>
              {step.unit && <span style={{fontSize:7, color:'var(--text3)'}}>({step.unit})</span>}
            </div>
            {i < arr.length-1 && <span style={{color:'var(--border)', fontSize:12}}>→</span>}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
